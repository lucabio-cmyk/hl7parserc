name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Hl7Bridge.sln

      - name: Publish Windows self-contained EXE
        run: |
          dotnet publish Hl7Bridge.Service/Hl7Bridge.Service.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/win-x64

      - name: Create ZIP package
        run: |
          cd publish/win-x64
          zip -r ../../Hl7Bridge-win-x64.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hl7Bridge-win-x64
          path: Hl7Bridge-win-x64.zip

      - name: Upload asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Hl7Bridge-win-x64.zip
